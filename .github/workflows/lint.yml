name: CI Lint

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm run lint:ci

      - name: Prettier Check (warn only)
        shell: bash
        run: |
          set +e
          pnpm run format:check
          code=$?

          if [ "$code" -eq 0 ]; then
            echo "Prettier passed."
            exit 0
          elif [ "$code" -eq 1 ]; then
            echo "::warning::Prettier found unformatted files (non-blocking)."
            exit 0
          else
            echo "::error::Prettier failed with exit code $code."
            exit "$code"
          fi
